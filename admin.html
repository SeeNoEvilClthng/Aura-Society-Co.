<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Aura Society Co.</title>
    <meta name="description" content="Manage Aura Society Co. fragrance products.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="assets/branding/aura-society-logo.png" alt="Aura Society Co.">
      </a>
      <nav class="nav-actions" aria-label="Admin navigation">
        <a href="index.html">Storefront</a>
        <button id="logoutButton" class="secondary-button hidden" type="button">Log out</button>
        <button id="exportButton" class="secondary-button hidden" type="button">Export JSON</button>
      </nav>
    </header>

    <main id="loginShell" class="login-shell">
      <form id="loginForm" class="login-card">
        <p class="eyebrow">Admin access</p>
        <h1>Sign In</h1>
        <label>
          Username
          <input id="adminUsername" class="input" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="adminPassword" class="input" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">Unlock admin</button>
        <p id="loginError" class="login-error" role="alert"></p>
      </form>
    </main>

    <main id="adminShell" class="admin-shell hidden">
      <section class="admin-intro">
        <p class="eyebrow">Store admin</p>
        <h1>Manage Aura Society</h1>
        <p>Edit the homepage interface, collection cards, products, pictures, and every fragrance shown to customers.</p>
      </section>

      <section class="site-editor admin-products">
        <div class="section-head">
          <div>
            <p class="eyebrow">Homepage design</p>
            <h2>Storefront Sections</h2>
          </div>
          <button id="saveSiteButton" class="secondary-button" type="button">Save homepage</button>
        </div>
        <form id="siteForm" class="site-form">
          <div class="form-grid">
            <label>
              Top banner
              <input id="siteTopBanner" class="input" placeholder="Free standard shipping on fragrance orders $100+ USD">
            </label>
            <label>
              Nav links
              <input id="siteNavLinks" class="input" placeholder="New Arrivals, Best Sellers, Collections">
            </label>
            <label>
              Hero kicker
              <input id="siteHeroKicker" class="input" placeholder="New fragrance drop">
            </label>
            <label>
              Hero title
              <input id="siteHeroTitle" class="input" placeholder="Aura Society Co. Signature Scents">
            </label>
          </div>
          <label>
            Hero subtitle
            <textarea id="siteHeroSubtitle" class="input textarea" placeholder="Main homepage message"></textarea>
          </label>
          <div class="form-grid">
            <label>
              Hero button
              <input id="siteHeroButton" class="input" placeholder="Shop the collection">
            </label>
            <label>
              Featured title
              <input id="siteFeaturedTitle" class="input" placeholder="Featured">
            </label>
            <label>
              Featured links
              <input id="siteFeaturedLinks" class="input" placeholder="Signature Collection, Evening Reserve, Daily Rituals, Fragrance Oils">
            </label>
            <label>
              Collections title
              <input id="siteCollectionsTitle" class="input" placeholder="Collections">
            </label>
            <label>
              Trending title
              <input id="siteTrendingTitle" class="input" placeholder="Trending">
            </label>
            <label>
              Scent family section title
              <input id="siteBrandsTitle" class="input" placeholder="Scent Families">
            </label>
            <label>
              Help title
              <input id="siteHelpTitle" class="input" placeholder="Need help">
            </label>
            <label>
              VIP title
              <input id="siteVipTitle" class="input" placeholder="Become a VIP">
            </label>
          </div>
          <label>
            VIP text
            <textarea id="siteVipText" class="input textarea" placeholder="Subscribe message"></textarea>
          </label>
          <div id="promoEditor" class="promo-editor"></div>
        </form>
      </section>

      <section class="admin-layout">
        <form id="productForm" class="admin-form">
          <input type="hidden" id="productId">

          <div class="form-grid">
            <label>
              Product name
              <input id="productName" class="input" required placeholder="Midnight Ember">
            </label>
            <label>
              Brand
              <input id="productBrand" class="input" required placeholder="Aura Society Co.">
            </label>
            <label>
              Price
              <input id="productPrice" class="input" required type="number" min="0" step="0.01" placeholder="88.00">
            </label>
            <label>
              Size
              <input id="productSize" class="input" required placeholder="50 ml">
            </label>
            <label>
              Scent family
              <select id="productFamily" class="input" required>
                <option value="Amber">Amber</option>
                <option value="Citrus">Citrus</option>
                <option value="Floral">Floral</option>
                <option value="Fresh">Fresh</option>
                <option value="Gourmand">Gourmand</option>
                <option value="Woody">Woody</option>
              </select>
            </label>
            <label>
              Collection
              <input id="productCollection" class="input" required list="collectionOptions" placeholder="Signature Collection">
              <datalist id="collectionOptions"></datalist>
            </label>
            <label>
              Stock
              <input id="productStock" class="input" required type="number" min="0" step="1" placeholder="12">
            </label>
          </div>

          <label>
            Notes
            <input id="productNotes" class="input" required placeholder="Saffron, cedar, vanilla smoke">
          </label>

          <label>
            Description
            <textarea id="productDescription" class="input textarea" required placeholder="Describe the fragrance profile and mood."></textarea>
          </label>

          <label>
            Product picture
            <input id="productImage" class="input file-input" type="file" accept="image/*">
          </label>

          <div class="image-preview" id="imagePreview">
            <span>No image selected</span>
          </div>

          <div class="form-actions">
            <button id="saveProductButton" class="primary-button" type="submit">Save product</button>
            <button id="resetButton" class="secondary-button" type="button">Clear form</button>
          </div>
        </form>

        <div class="admin-products">
          <div class="section-head">
            <div>
              <p class="eyebrow">Inventory</p>
              <h2>Products</h2>
            </div>
            <div class="admin-actions">
              <button id="syncCatalogButton" class="secondary-button" type="button">Sync published catalog</button>
              <button id="seedButton" class="secondary-button" type="button">Restore samples</button>
            </div>
          </div>
          <div id="adminProductList" class="admin-list"></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="admin.js?v=retail-layout-20260526"></script>
  </body>
</html>
